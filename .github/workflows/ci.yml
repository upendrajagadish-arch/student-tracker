name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: placementiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d placementiq_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/placementiq_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/placementiq_test?schema=public
      SESSION_SECRET: ci-test-secret-thirty-two-characters-minimum
      STORAGE_PROVIDER: local
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: node scripts/prisma-generate.mjs

      - name: Push database schema
        run: npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
